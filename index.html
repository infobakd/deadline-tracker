<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bak'd Cookies — Operations Deadline Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Jost:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --teal: #3DCFCF;
  --teal-dark: #1AACAC;
  --teal-light: #E6FAFA;
  --pink: #FF3D8B;
  --pink-light: #FFF0F6;
  --bg: #E8F8F8;
  --surface: #FFFFFF;
  --surface2: #F5FBFB;
  --border: #D0ECEC;
  --text: #1A2E2E;
  --text2: #4A7070;
  --text3: #8AACAC;
  --foh-c: #FF3D8B;   --foh-bg: #FFF0F6;
  --boh-c: #1AACAC;   --boh-bg: #E6FAFA;
  --mkt-c:  #F5A623;  --mkt-bg:  #FFF8EC;
  --mgmt-c: #7B5EA7;  --mgmt-bg: #F2EEFA;
  --red: #E53E3E;     --red-bg: #FFF5F5;
  --amber: #C07A00;   --amber-bg: #FFFBEB;
  --green: #1A8A5A;   --green-bg: #F0FAF5;
  --radius: 14px;     --radius-lg: 18px;
  --font-head: 'Fraunces', serif;
  --font-body: 'Jost', sans-serif;
  --font-mono: 'DM Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-body); background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 60px; }

/* ── HEADER ── */
.header {
  background: var(--teal); padding: 0 32px;
  display: flex; align-items: center; justify-content: space-between;
  height: 72px; position: sticky; top: 0; z-index: 50;
  box-shadow: 0 2px 16px rgba(29,172,172,0.28);
}
.header-brand { display: flex; align-items: center; gap: 12px; }
.brand-logo { height: 46px; width: auto; object-fit: contain; }
.brand-label { font-family: var(--font-head); font-size: 18px; font-weight: 600; color: #fff; letter-spacing: -0.3px; line-height: 1.2; }
.brand-sub { font-family: var(--font-body); font-size: 11px; color: rgba(255,255,255,0.75); font-weight: 400; letter-spacing: 0.6px; text-transform: uppercase; }
.btn-add-header {
  background: var(--pink); color: #fff; border: none;
  padding: 9px 22px; border-radius: 999px; font-size: 13px; font-weight: 600; cursor: pointer;
  font-family: var(--font-body); box-shadow: 0 2px 14px rgba(255,61,139,0.4);
  transition: opacity 0.15s, transform 0.1s;
}
.btn-add-header:hover { opacity: 0.88; transform: translateY(-1px); }

/* ── MAIN ── */
.main { max-width: 900px; margin: 0 auto; padding: 28px 20px 0; }

/* ── METRICS ── */
.metrics-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; margin-bottom: 24px; }
.metric-card {
  background: var(--surface); border-radius: var(--radius-lg);
  padding: 18px 20px; border-top: 4px solid var(--border);
  box-shadow: 0 1px 6px rgba(0,0,0,0.04);
}
.metric-card.mc-total  { border-top-color: var(--teal); }
.metric-card.mc-over   { border-top-color: var(--red); }
.metric-card.mc-soon   { border-top-color: var(--amber); }
.metric-card.mc-done   { border-top-color: var(--green); }
.metric-label { font-family: var(--font-body); font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
.metric-val { font-family: var(--font-head); font-size: 36px; font-weight: 700; color: var(--text); line-height: 1; }
.metric-val.red   { color: var(--red); }
.metric-val.amber { color: var(--amber); }
.metric-val.green { color: var(--green); }

/* ── DEPT TABS ── */
.dept-tabs { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 14px; }
.dept-tab {
  padding: 8px 16px; border-radius: 999px; font-family: var(--font-body);
  font-size: 13px; font-weight: 600; cursor: pointer;
  border: 2px solid var(--border); background: var(--surface); color: var(--text2);
  transition: all 0.14s; display: flex; align-items: center; justify-content: center; gap: 7px;
}
.dept-tab:hover { border-color: var(--teal); color: var(--teal-dark); }
.dept-tab.active { border-color: transparent; color: #fff; }
.dept-tab.active.t-all  { background: #222; }
.dept-tab.active.t-boh  { background: var(--boh-c); }
.dept-tab.active.t-foh  { background: var(--foh-c); }
.dept-tab.active.t-mkt  { background: var(--mkt-c); }
.dept-tab.active.t-mgmt  { background: var(--mgmt-c); }
.dept-tab.active.t-staff { background: #E8622A; }
.dept-tab.active.t-jandy { background: #2A7AE8; }
.tab-pct { font-family: var(--font-mono); font-size: 11px; opacity: 0.85; }

/* ── FILTER ROW ── */
.freq-row { display: flex; gap: 6px; flex-wrap: nowrap; margin-bottom: 26px; align-items: center; justify-content: center; overflow-x: auto; }
.freq-label { font-family: var(--font-mono); font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.6px; margin-right: 2px; white-space: nowrap; }
.freq-btn {
  font-family: var(--font-body); font-size: 12px; font-weight: 500; padding: 5px 13px;
  border-radius: 999px; border: 1.5px solid var(--border); background: var(--surface); color: var(--text2);
  cursor: pointer; transition: all 0.12s; white-space: nowrap;
}
.freq-btn:hover { border-color: var(--teal); color: var(--teal-dark); }
.freq-btn.active { background: #222; border-color: #222; color: #fff; }

/* ── SECTION ── */
.section { margin-bottom: 20px; }
.section-header {
  display: flex; align-items: center; gap: 10px;
  background: var(--surface); border-radius: var(--radius-lg);
  padding: 14px 18px; margin-bottom: 0;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
}
.section-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
.section-title { font-family: 'Baloo 2', cursive; font-weight: 800; font-size: 22px; font-weight: 400; color: var(--text); letter-spacing: 0.5px; -webkit-text-stroke: 1px currentColor; paint-order: stroke fill; }
.section-count { font-family: var(--font-mono); font-size: 11px; color: var(--text3); flex: 1; text-align: center; }
.section-right { display: flex; align-items: center; gap: 8px; margin-left: auto; }
.section-pct { font-family: var(--font-head); font-size: 15px; font-weight: 600; }
.section-sub { font-family: var(--font-mono); font-size: 10px; color: var(--text3); text-align: right; line-height: 1.4; }

/* ── TASK CARDS ── */
.task-list { display: flex; flex-direction: column; gap: 0; }
.task-card {
  background: var(--surface); border-radius: var(--radius);
  padding: 14px 16px 14px 0;
  display: flex; align-items: flex-start; gap: 10px;
  margin-top: 8px;
  border-left: 4px solid transparent;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  transition: box-shadow 0.15s, transform 0.1s;
  position: relative;
}
.task-card:hover { box-shadow: 0 3px 12px rgba(0,0,0,0.08); transform: translateY(-1px); }
.task-card.done { opacity: 0.48; }
.task-card.done .task-name { text-decoration: line-through; color: var(--text3); }
.task-card.drag-over { box-shadow: 0 0 0 2px var(--teal); }
.task-card.dragging { opacity: 0.35; }

.task-left { display: flex; align-items: flex-start; gap: 6px; padding: 2px 0 0 14px; flex-shrink: 0; }
.drag-handle { cursor: grab; color: var(--text3); font-size: 13px; user-select: none; padding-top: 2px; }
.drag-handle:active { cursor: grabbing; }
.task-check {
  width: 20px; height: 20px; border-radius: 50%;
  border: 2px solid var(--border); background: transparent; cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 10px; color: #fff;
  transition: all 0.12s; margin-top: 1px;
}
.task-check:hover { border-color: var(--teal); }
.task-check.checked { background: var(--teal); border-color: var(--teal); }

.task-body { flex: 1; min-width: 0; }
.task-name { font-family: 'Jost', sans-serif; font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 3px; }
.task-freq-badge {
  display: inline-block; font-family: var(--font-mono); font-size: 10px; font-weight: 500;
  padding: 2px 8px; border-radius: 999px; border: 1.5px solid; text-transform: uppercase;
  letter-spacing: 0.4px; margin-right: 6px; margin-bottom: 4px;
}
.task-desc { display: inline; font-family: var(--font-body); font-size: 12px; font-weight: 600; color: var(--text2); }
.task-owner-row { display: flex; align-items: center; gap: 5px; margin-top: 6px; }
.owner-icon { font-size: 13px; color: var(--text3); }
.task-owner {
  font-family: var(--font-body); font-size: 12px; color: var(--text2); font-weight: 400; font-style: normal;
  border: none; background: transparent; outline: none; padding: 1px 4px;
  border-radius: 4px; min-width: 60px; cursor: text; transition: background 0.12s;
}
.task-owner:focus { background: var(--teal-light); }
.task-owner::placeholder { color: var(--text3); }

.task-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; padding-right: 14px; flex-shrink: 0; min-width: 120px; }
.task-due {
  font-family: var(--font-mono); font-size: 11px; font-weight: 500;
  padding: 4px 10px; border-radius: 999px; white-space: nowrap;
}
.due-ok      { background: var(--green-bg); color: var(--green); border: 1px solid #b0dfc8; }
.due-soon    { background: var(--amber-bg); color: var(--amber); border: 1px solid #e8c97a; }
.due-overdue { background: var(--red-bg);   color: var(--red);   border: 1px solid #f5b8b8; }
.due-done    { background: #F0F4F4; color: var(--text3); }
.edit-link {
  font-family: var(--font-body); font-size: 11px; color: var(--text3);
  cursor: pointer; background: none; border: none; padding: 0;
  transition: color 0.12s;
}
.edit-link:hover { color: var(--text2); }

/* ── DONE DIVIDER ── */
.done-divider { font-family: var(--font-mono); font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.7px; padding: 12px 4px 2px; }

/* ── ADD ROW ── */
.add-row {
  margin-top: 10px; font-family: var(--font-body); font-size: 13px; font-weight: 500;
  color: var(--text3); background: none; border: 1.5px dashed var(--border);
  padding: 11px 20px; border-radius: var(--radius); cursor: pointer; width: 100%; text-align: center; transition: all 0.12s;
}
.add-row:hover { border-color: var(--teal); color: var(--teal-dark); background: var(--teal-light); }
.empty { font-family: var(--font-body); font-size: 13px; color: var(--text3); padding: 24px; text-align: center; }

/* ── DEPT PROGRESS CARD ── */
.dept-card {
  display: grid;
  grid-template-columns: 200px 1fr 200px;
  align-items: center; gap: 20px;
  background: var(--surface); border-radius: var(--radius-lg);
  padding: 20px 24px; margin-bottom: 16px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.05);
  border-top: 4px solid var(--dept-color, var(--teal));
  min-height: 110px;
}
.dept-card-left { display: flex; align-items: center; gap: 14px; width: 200px; flex-shrink: 0; }
.dept-card-name { font-family: 'Baloo 2', cursive; font-weight: 800; font-size: 36px; line-height: 1; letter-spacing: 0.5px; -webkit-text-stroke: 1.5px currentColor; paint-order: stroke fill; }
.dept-card-sub  { font-family: var(--font-body); font-size: 12px; color: var(--text2); margin-top: 4px; }
.dept-card-mid  { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; }
.dept-card-pct  { font-family: 'Baloo 2', cursive; font-weight: 800; font-size: 28px; line-height: 1; }
.dept-card-prog-bar { width: 140px; height: 7px; background: var(--border); border-radius: 999px; overflow: hidden; }
.dept-card-prog-fill { height: 100%; border-radius: 999px; transition: width 0.4s ease; }
.dept-card-prog-label { font-family: var(--font-mono); font-size: 10px; color: var(--text3); }
.dept-card-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 200px; flex-shrink: 0; }
.dept-stat {
  background: var(--surface2); border-radius: 10px;
  padding: 10px 8px; text-align: center;
  border: 1px solid var(--border);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.dept-stat-val  { font-family: var(--font-head); font-size: 22px; font-weight: 700; line-height: 1; }
.dept-stat-lbl  { font-family: var(--font-body); font-size: 10px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 3px; }

/* ── MODAL ── */
.overlay { display: none; position: fixed; inset: 0; background: rgba(20,40,40,0.45); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
.overlay.open { display: flex; }
.modal { background: var(--surface); border-radius: var(--radius-lg); padding: 28px; width: 100%; max-width: 460px; box-shadow: 0 20px 60px rgba(20,60,60,0.18); }
.modal-title { font-family: var(--font-head); font-size: 20px; font-weight: 600; color: var(--text); margin-bottom: 20px; letter-spacing: -0.3px; }
.field { margin-bottom: 14px; }
.field label { font-family: var(--font-body); font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 5px; }
.field input, .field select, .field textarea { width: 100%; padding: 9px 12px; border: 1.5px solid var(--border); border-radius: 8px; font-family: var(--font-body); font-size: 13px; color: var(--text); background: var(--surface2); outline: none; transition: border-color 0.12s; }
.field textarea { resize: vertical; min-height: 60px; }
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--teal); background: #fff; }
.modal-actions { display: flex; gap: 8px; margin-top: 20px; justify-content: flex-end; }
.btn { font-family: var(--font-body); font-size: 13px; font-weight: 600; padding: 9px 20px; border-radius: 999px; border: none; cursor: pointer; transition: opacity 0.12s, transform 0.1s; }
.btn:hover { opacity: 0.85; transform: translateY(-1px); }
.btn-save   { background: var(--teal); color: #fff; }
.btn-cancel { background: var(--surface2); color: var(--text2); }
.btn-delete { background: var(--red-bg); color: var(--red); margin-right: auto; }






/* ── RECURRING BADGE ── */
.recurring-badge {
  font-family: var(--font-mono); font-size: 9px; font-weight: 500;
  padding: 1px 6px; border-radius: 999px; text-transform: uppercase;
  letter-spacing: 0.4px; border: 1px solid;
}
.badge-recurring { color: var(--teal-dark); border-color: var(--teal); background: var(--teal-light); }
.badge-onetime   { color: var(--text3);     border-color: var(--border); background: var(--surface2); }


/* ── EXPORT BUTTON ── */
.btn-export {
  background: rgba(255,255,255,0.15); color: #fff; border: 1.5px solid rgba(255,255,255,0.4);
  padding: 7px 16px; border-radius: 999px; font-size: 12px; font-weight: 600;
  cursor: pointer; font-family: var(--font-body); letter-spacing: 0.2px;
  transition: background 0.15s;
}
.btn-export:hover { background: rgba(255,255,255,0.25); }

/* ── EXPORT MODAL ── */
.export-modal { background: var(--surface); border-radius: var(--radius-lg); padding: 28px; width: 100%; max-width: 560px; max-height: 80vh; display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(20,60,60,0.18); }
.export-title { font-family: var(--font-head); font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
.export-sub { font-family: var(--font-body); font-size: 12px; color: var(--text3); margin-bottom: 14px; }
.export-box {
  font-family: var(--font-mono); font-size: 11px; color: var(--text2);
  background: var(--surface2); border: 1.5px solid var(--border);
  border-radius: 10px; padding: 14px; overflow-y: auto; flex: 1;
  white-space: pre-wrap; word-break: break-all; max-height: 340px;
  line-height: 1.6;
}
.export-actions { display: flex; gap: 8px; margin-top: 14px; justify-content: flex-end; }


/* ── LOADING ── */
.loading-wrap { display:flex; align-items:center; justify-content:center; flex-direction:column; gap:12px; padding:60px 20px; }
.loading-cookie { font-size:40px; animation: spin 1.5s linear infinite; display:inline-block; }
.loading-text { font-family:var(--font-body); font-size:14px; color:var(--text3); }
@keyframes spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
.save-indicator {
  position:fixed; bottom:16px; right:16px;
  background:var(--teal); color:#fff;
  font-family:var(--font-body); font-size:11px; font-weight:600;
  padding:6px 14px; border-radius:999px;
  opacity:0; transition:opacity 0.3s;
  pointer-events:none; z-index:200;
}
.save-indicator.show { opacity:1; }

</style>
</head>

<script>
const DEPT_META = {
  FOH:  { color:'#FF3D8B', bg:'#FFF0F6', border:'#FFB3D1', tabCls:'t-foh',  label:'FOH' },
  BOH:  { color:'#1AACAC', bg:'#E6FAFA', border:'#9ADEDE', tabCls:'t-boh',  label:'BOH' },
  MKT:  { color:'#F5A623', bg:'#FFF8EC', border:'#F5D08A', tabCls:'t-mkt',  label:'MKT' },
  MGMT:  { color:'#7B5EA7', bg:'#F2EEFA', border:'#C4AEDE', tabCls:'t-mgmt',  label:'MGMT' },
  STAFF: { color:'#E8622A', bg:'#FFF3EE', border:'#F5B89A', tabCls:'t-staff', label:'Onboarding & Check-ins' },
  JANDY: { color:'#2A7AE8', bg:'#EEF3FF', border:'#9AB8F5', tabCls:'t-jandy', label:'JANDY' },
};

const TAB_ORDER = [
  { key:'All',   label:'ALL',                    cls:'t-all',   color:'#3DCFCF' },
  { key:'BOH',   label:'BOH',                    cls:'t-boh',   color:'#1AACAC' },
  { key:'FOH',   label:'FOH',                    cls:'t-foh',   color:'#FF3D8B' },
  { key:'MKT',   label:'MKT',                    cls:'t-mkt',   color:'#F5A623' },
  { key:'MGMT',  label:'MGMT',                   cls:'t-mgmt',  color:'#7B5EA7' },
  { key:'JANDY', label:'JANDY',                  cls:'t-jandy', color:'#2A7AE8' },
  { key:'STAFF', label:'Onboarding & Check-ins', cls:'t-staff', color:'#E8622A' },
];

let tasks = [];
let nextId = 1;
let activeDept = 'All';
let freqFilter = 'all';
let editId = null;
let dragId = null;

// ── HELPERS ──────────────────────────────────────────────────────
function today() { return new Date().toISOString().split('T')[0]; }
function daysUntil(due) { return Math.round((new Date(due) - new Date(today())) / 86400000); }
function dueClass(t) {
  if (t.done) return 'due-done';
  const d = daysUntil(t.due);
  return d < 0 ? 'due-overdue' : d <= 7 ? 'due-soon' : 'due-ok';
}
function dueLabelText(t) {
  if (t.done) return 'done';
  const d = daysUntil(t.due);
  if (d < 0) return Math.abs(d) + 'd overdue';
  if (d === 0) return 'due today';
  if (d <= 7) return d + 'd left';
  const dt = new Date(t.due + 'T00:00:00');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const mon = months[dt.getMonth()];
  const dd = String(dt.getDate()).padStart(2, '0');
  const yy = String(dt.getFullYear()).slice(2);
  return mon + '-' + dd + '-' + yy;
}
function deptPct(dept) {
  const src = dept === 'All' ? tasks : tasks.filter(t => t.dept === dept);
  return src.length === 0 ? 0 : Math.round(src.filter(t => t.done).length / src.length * 100);
}
function deptDone(dept) {
  return tasks.filter(t => (dept === 'All' || t.dept === dept) && t.done).length;
}
function deptTotal(dept) {
  return (dept === 'All' ? tasks : tasks.filter(t => t.dept === dept)).length;
}

// ── COOKIE SVG ────────────────────────────────────────────────────
// Cookie display:
// 0%   → 🍪 fully covered by faded dept color
// 1-99%→ pie/clock-wipe reveals cookie clockwise as tasks complete
// 100% → fully revealed 🍪
function cookieTabSVG(pct, color, size) {
  const cx = size / 2, cy = size / 2;
  const r  = size / 2;
  const fontSize = size * 0.86;

  function coverPath(coverPct) {
    if (coverPct <= 0) return '';
    if (coverPct >= 1) {
      return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${color}" opacity="0.55"/>`;
    }
    const angle = coverPct * 2 * Math.PI;
    const startX = cx + r * Math.cos(-Math.PI / 2);
    const startY = cy + r * Math.sin(-Math.PI / 2);
    const endX   = cx + r * Math.cos(-Math.PI / 2 + angle);
    const endY   = cy + r * Math.sin(-Math.PI / 2 + angle);
    const largeArc = angle > Math.PI ? 1 : 0;
    return `<path d="M${cx},${cy} L${startX.toFixed(2)},${startY.toFixed(2)} A${r},${r} 0 ${largeArc},1 ${endX.toFixed(2)},${endY.toFixed(2)} Z" fill="${color}" opacity="0.55"/>`;
  }

  const coverPct = 1 - pct / 100;

  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="display:block;flex-shrink:0;overflow:hidden;border-radius:50%">
    <text x="${cx}" y="${cy + fontSize * 0.36}" font-size="${fontSize}" text-anchor="middle" dominant-baseline="auto">🍪</text>
    ${coverPath(coverPct)}
  </svg>`;
}


// ── METRICS ───────────────────────────────────────────────────────
function renderMetrics() {
  const total = tasks.length;
  const done = tasks.filter(t => t.done).length;
  const overdue = tasks.filter(t => !t.done && daysUntil(t.due) < 0).length;
  const soon = tasks.filter(t => !t.done && daysUntil(t.due) >= 0 && daysUntil(t.due) <= 7).length;
  document.getElementById('metrics').innerHTML = `
    <div class="metric-card mc-total"><div class="metric-label">Total Tasks</div><div class="metric-val">${total}</div></div>
    <div class="metric-card mc-over"><div class="metric-label">Overdue</div><div class="metric-val red">${overdue}</div></div>
    <div class="metric-card mc-soon"><div class="metric-label">Due This Week</div><div class="metric-val amber">${soon}</div></div>
    <div class="metric-card mc-done"><div class="metric-label">Completed</div><div class="metric-val green">${done}</div></div>`;
}

// ── TABS ──────────────────────────────────────────────────────────
function renderTabs() {
  document.getElementById('dept-tabs').innerHTML = TAB_ORDER.map(({key, label, cls, color}) => {
    const pct = deptPct(key);

// ── FILTER TASKS ──────────────────────────────────────────────────
function filterTasks(src) {
  if (freqFilter === 'all') return src;
  if (freqFilter === 'overdue') return src.filter(t => !t.done && daysUntil(t.due) < 0);
  if (freqFilter === 'soon') return src.filter(t => !t.done && daysUntil(t.due) >= 0 && daysUntil(t.due) <= 7);
  return src.filter(t => t.freq === freqFilter);
}

// ── BUILD TASK LIST (active first, done at bottom) ────────────────
function buildTaskList(src) {
  const active = src.filter(t => !t.done);
  const done   = src.filter(t => t.done);
  let html = active.map(t => taskCard(t)).join('');
  if (done.length) {
    html += `<div class="done-divider">✓ Completed (${done.length})</div>`;
    html += done.map(t => taskCard(t)).join('');
  }
  return html || '<p class="empty">No tasks match this filter.</p>';
}

// ── NEXT DUE DATE ─────────────────────────────────────────────────
function nextDueDate(due, freq) {
  const d = new Date(due + 'T00:00:00');
  switch(freq) {
    case 'daily':     d.setDate(d.getDate() + 1);       break;
    case 'weekly':    d.setDate(d.getDate() + 7);        break;
    case 'monthly':   d.setMonth(d.getMonth() + 1);      break;
    case 'quarterly': d.setMonth(d.getMonth() + 3);      break;
    case 'biannual':  d.setMonth(d.getMonth() + 6);      break;
    case 'annually':  d.setFullYear(d.getFullYear() + 1);break;
    default: return due;
  }
  return d.toISOString().split('T')[0];
}

// ── AUTO-RESET RECURRING TASKS ────────────────────────────────────
// One-time freqs for STAFF that should never auto-reset
const ONE_TIME_FREQS = new Set(['week1','week2','1.5months','3months','one-time']);

function autoResetRecurring() {
  const tod = today();
  let changed = false;
  tasks.forEach(t => {
    if (!t.recurring) return;
    if (ONE_TIME_FREQS.has(t.freq)) return;
    if (t.done && t.due < tod) {
      t.due  = nextDueDate(t.due, t.freq);
      t.done = false;
      changed = true;
    }
  });
  if (changed) saveTasks();
  return changed;
}

}

// ── DATE PARSE ────────────────────────────────────────────────────
const MONTHS = {jan:'01',feb:'02',mar:'03',apr:'04',may:'05',jun:'06',jul:'07',aug:'08',sep:'09',oct:'10',nov:'11',dec:'12'};
function parseInputDate(str) {
  // Accepts Mon-DD-YY or Mon-DD-YYYY e.g. Mar-23-26 or Mar-23-2026
  if (!str) return null;
  const parts = str.trim().split('-');
  if (parts.length !== 3) return null;
  const mon = MONTHS[parts[0].toLowerCase().slice(0,3)];
  if (!mon) return null;
  const day = parts[1].padStart(2,'0');
  let year = parts[2];
  if (year.length === 2) year = '20' + year;
  return year + '-' + mon + '-' + day;
}
function formatDisplayDate(isoStr) {
  // Convert YYYY-MM-DD back to DD-Mon-YY for display in input
  if (!isoStr) return '';
  const dt = new Date(isoStr + 'T00:00:00');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const mon = months[dt.getMonth()];
  const dd = String(dt.getDate()).padStart(2,'0');
  const yy = String(dt.getFullYear()).slice(2);
  return mon + '-' + dd + '-' + yy;
}

function dragStart(e, id) { dragId = id; setTimeout(() => { const el = document.getElementById('tc-' + id); if (el) el.classList.add('dragging'); }, 0); }
function dragOver(e, id) { e.preventDefault(); document.querySelectorAll('.task-card').forEach(c => c.classList.remove('drag-over')); const el = document.getElementById('tc-' + id); if (el && id !== dragId) el.classList.add('drag-over'); }
function dragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
function dragDrop(e, tid) {
  e.preventDefault();
  document.querySelectorAll('.task-card').forEach(c => c.classList.remove('drag-over','dragging'));
  if (dragId === null || dragId === tid) return;
  const drag = tasks.find(t => t.id === dragId), tgt = tasks.find(t => t.id === tid);
  if (!drag || !tgt || drag.done || tgt.done) return;
  const fi = tasks.indexOf(drag), ti = tasks.indexOf(tgt);
  tasks.splice(fi, 1); tasks.splice(ti, 0, drag);
  dragId = null; saveTasks(); renderContent();
}
function dragEnd() { document.querySelectorAll('.task-card').forEach(c => c.classList.remove('drag-over','dragging')); dragId = null; }
